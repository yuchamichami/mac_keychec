<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyCheck — Web</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B1030'/%3E%3Crect x='25' y='35' width='50' height='40' rx='6' fill='%23FCFCFE'/%3E%3Ctext x='50' y='65' font-family='monospace' font-size='28' font-weight='700' text-anchor='middle' fill='%230B1030'%3EK%3C/text%3E%3C/svg%3E">
<style>
  /* ============= Design tokens (verbatim from design/ui/tokens.json) ============= */
  :root {
    --bg-window:      #0B1030;
    --bg-window-grad: #171347;
    --bg-card:        #0E0F24;
    --bg-card-hover:  #131428;
    --accent-cyan:    #5BD1FF;
    --accent-cyan-2:  #2E8BFF;
    --down-green:     #5BFF8B;
    --up-orange:      #FFA85B;
    --peak-red:       #FF5F5F;
    --text-primary:   #ECEEFF;
    --text-secondary: #7D8090;
    --keycap-top-l:   #FCFCFE;
    --keycap-top-d:   #D2D2DE;
    --metal-light:    #3A3D4A;
    --metal-dark:     #1D1F28;
    --divider:        rgba(255,255,255,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Monaco, monospace;
    color: var(--text-primary);
    background:
      radial-gradient(circle at top left, rgba(46, 139, 255, 0.10) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-window-grad) 0%, var(--bg-window) 100%);
    overflow: hidden;
    user-select: none;
  }
  /* ============= Layout ============= */
  .app {
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: 100vh;
    padding: 22px 18px 18px;
  }
  .control-bar {
    display: flex;
    align-items: center;
    gap: 28px;
    background: rgba(14, 15, 36, 0.6);
    border: 1px solid var(--divider);
    border-radius: 14px;
    padding: 18px 24px;
  }
  .vsep {
    width: 1px;
    height: 64px;
    background: rgba(255, 255, 255, 0.06);
  }
  .section-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  .log-header .title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .log-header .count {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    color: var(--text-secondary);
  }
  /* ============= Power button ============= */
  .power-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .power {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #4B4F5E 0%, #2A2C38 50%, #15161E 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.20),
      inset 0 -3px 6px rgba(0,0,0,0.7),
      0 4px 10px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 80ms ease-out;
  }
  .power:active { transform: scale(0.96); }
  .power .glyph {
    color: var(--text-secondary);
    transition: color 120ms;
  }
  .power.on .glyph {
    color: var(--down-green);
    filter: drop-shadow(0 0 4px rgba(91, 255, 139, 0.6));
  }
  .power .led {
    position: absolute;
    top: 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    transition: background 150ms, box-shadow 150ms;
  }
  .power.on .led {
    background: var(--down-green);
    box-shadow: 0 0 5px var(--down-green), 0 0 12px rgba(91, 255, 139, 0.6);
  }
  /* ============= Tone keycap row ============= */
  .tone-section { display: flex; flex-direction: column; gap: 6px; }
  .keycap-row { display: flex; gap: 6px; }
  .keycap {
    width: 76px;
    height: 40px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 80ms ease-out, filter 100ms;
    background:
      linear-gradient(180deg, #20222E 0%, #15161E 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -2px 4px rgba(0,0,0,0.40),
      0 2px 4px rgba(0,0,0,0.35);
    color: var(--text-primary);
  }
  .keycap.action {
    width: 72px;
  }
  .keycap:hover {
    filter: brightness(1.1);
  }
  .keycap:active {
    transform: scale(0.96);
  }
  .keycap.selected {
    background: linear-gradient(180deg, var(--keycap-top-l) 0%, var(--keycap-top-d) 100%);
    border: 1.5px solid rgba(91, 209, 255, 0.55);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.95),
      0 0 12px rgba(91, 209, 255, 0.50),
      0 0 22px rgba(91, 209, 255, 0.25);
    color: rgba(0, 0, 0, 0.85);
  }
  /* ============= Volume knob ============= */
  .knob-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .knob-svg {
    width: 84px;
    height: 84px;
    cursor: ns-resize;
    touch-action: none;
  }
  .knob-pct {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .knob-pct.peak { color: var(--peak-red); }
  /* ============= Action keycaps ============= */
  .actions { display: flex; gap: 8px; margin-left: auto; }
  /* ============= Event log ============= */
  .log-container {
    flex: 1;
    position: relative;
    background: linear-gradient(180deg, #08091A 0%, #0E0F24 100%);
    border: 1px solid var(--divider);
    border-radius: 10px;
    overflow: hidden;
  }
  .log-scroll {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .log-scroll::-webkit-scrollbar { width: 8px; }
  .log-scroll::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.10);
    border-radius: 4px;
  }
  /* CRT scanline */
  .scanline {
    position: absolute;
    left: 0;
    right: 0;
    height: 60px;
    pointer-events: none;
    background: linear-gradient(180deg, transparent 0%, rgba(91, 209, 255, 0.13) 50%, transparent 100%);
    mix-blend-mode: plus-lighter;
    animation: scan 6s linear infinite;
  }
  @keyframes scan {
    0%   { top: 100%; }
    100% { top: -60px; }
  }
  /* Event row */
  .row {
    display: flex;
    align-items: center;
    height: 56px;
    padding-right: 18px;
    border-bottom: 0.5px solid rgba(255, 255, 255, 0.04);
    position: relative;
    transition: background 120ms;
  }
  .row:hover {
    background: rgba(91, 209, 255, 0.04);
  }
  .row .accent {
    width: 4px;
    height: 56px;
    flex-shrink: 0;
    animation: rowFlash 250ms ease-out;
  }
  @keyframes rowFlash {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
  .row.down .accent {
    background: var(--down-green);
    box-shadow: 0 0 8px var(--down-green);
  }
  .row.up .accent {
    background: var(--up-orange);
    box-shadow: 0 0 8px var(--up-orange);
  }
  .row .dir {
    width: 70px;
    margin-left: 14px;
    font-size: 22px;
    font-weight: 300;
  }
  .row.down .dir { color: var(--down-green); }
  .row.up   .dir { color: var(--up-orange); }
  .row .center {
    flex: 1;
    padding-left: 4px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .row .json {
    font-size: 14px;
    font-weight: 500;
  }
  .row .json .punct  { color: var(--text-secondary); }
  .row .json .key    { color: var(--accent-cyan); }
  .row .json .value  { color: var(--text-primary); }
  .row .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 16px;
  }
  .row .glyph-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .row .held-chip {
    display: inline-flex;
    align-items: center;
    height: 18px;
    padding: 0 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .row .held-chip.tap   { color: var(--accent-cyan); background: rgba(91,209,255,0.10); }
  .row .held-chip.hold  { color: var(--up-orange);   background: rgba(255,168,91,0.10); }
  .row .held-chip.short { color: var(--peak-red);    background: rgba(255,95,95,0.10); }
  .row .chatter-chip {
    display: inline-flex;
    align-items: center;
    height: 18px;
    padding: 0 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--peak-red);
    background: rgba(255,95,95,0.15);
    border: 0.8px solid rgba(255,95,95,0.5);
  }
  .row .extra {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .row .right-cols {
    display: flex;
    gap: 16px;
    margin-left: 14px;
  }
  .row .col {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .row .col-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text-secondary);
  }
  .row .col-value {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  /* Empty state */
  .empty-msg {
    padding: 40px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 12px;
    letter-spacing: 1px;
  }
  /* Drag-region for windowed feel (no actual drag) */
  .titlebar-spacer { height: 0; }

  /* ============= Mode switcher ============= */
  .mode-switcher {
    display: inline-flex;
    gap: 4px;
    background: rgba(0,0,0,0.3);
    padding: 3px;
    border-radius: 5px;
    border: 1px solid var(--divider);
  }
  .mode-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 4px 14px;
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 120ms;
  }
  .mode-btn.selected {
    background: var(--accent-cyan);
    color: var(--bg-window);
    box-shadow: 0 0 8px rgba(91,209,255,0.4);
  }
  .mode-btn:not(.selected):hover { color: var(--text-primary); }

  /* ============= Matrix view ============= */
  .matrix-container {
    flex: 1;
    overflow-y: auto;
    background: linear-gradient(180deg, #08091A 0%, #0E0F24 100%);
    border: 1px solid var(--divider);
    border-radius: 10px;
    padding: 16px 18px;
    display: none;
  }
  .matrix-container.active { display: block; }
  .log-container.hidden { display: none; }
  .matrix-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .matrix-controls label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-right: 4px;
  }
  .kb-select {
    background: rgba(0,0,0,0.4);
    color: var(--text-primary);
    border: 1px solid var(--divider);
    border-radius: 5px;
    padding: 5px 10px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .matrix-btn {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--divider);
    color: var(--text-primary);
    padding: 5px 12px;
    border-radius: 5px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 120ms;
  }
  .matrix-btn:hover { border-color: var(--accent-cyan); }
  .matrix-btn.primary {
    background: var(--accent-cyan);
    color: var(--bg-window);
    border-color: var(--accent-cyan);
    box-shadow: 0 0 8px rgba(91,209,255,0.4);
  }
  .matrix-help {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .matrix-side {
    margin-bottom: 18px;
  }
  .matrix-side-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .pin-grid {
    display: grid;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    overflow: hidden;
    background: rgba(0,0,0,0.2);
  }
  .pin-cell {
    border-right: 1px solid rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding: 6px 4px;
    font-size: 10px;
    text-align: center;
    min-width: 56px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }
  .pin-cell.label {
    background: rgba(0,0,0,0.4);
    color: var(--text-secondary);
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 9px;
    text-transform: uppercase;
  }
  .pin-cell.label-corner {
    background: rgba(0,0,0,0.5);
    color: var(--text-secondary);
    font-size: 8px;
    line-height: 1.2;
  }
  .pin-cell.diagonal {
    background: repeating-linear-gradient(45deg,
      rgba(255,255,255,0.02) 0 6px,
      rgba(255,255,255,0.04) 6px 12px);
    color: var(--text-secondary);
  }
  .pin-cell.empty {
    background: rgba(255,255,255,0.01);
  }
  .pin-cell.key {
    background: rgba(125,128,144,0.10);
    color: var(--text-primary);
    cursor: pointer;
    transition: background 120ms;
    font-weight: 500;
  }
  .pin-cell.key.untestable {
    color: var(--text-secondary);
    background: rgba(255,255,255,0.02);
    font-style: italic;
  }
  .pin-cell.key.pressed {
    background: rgba(91,255,139,0.18);
    color: var(--down-green);
    box-shadow: inset 0 0 0 1px rgba(91,255,139,0.5);
  }
  .pin-cell.key.dead {
    background: rgba(255,95,95,0.18);
    color: var(--peak-red);
    box-shadow: inset 0 0 0 1px rgba(255,95,95,0.6);
  }
  .pin-cell.key.highlight-row,
  .pin-cell.key.highlight-col {
    background: rgba(91,209,255,0.12);
    box-shadow: inset 0 0 0 1px rgba(91,209,255,0.5);
  }
  .pin-cell.key.highlight-target {
    background: rgba(91,209,255,0.30);
    box-shadow: 0 0 0 1.5px var(--accent-cyan), 0 0 10px rgba(91,209,255,0.5);
  }
  .pin-cell .keylabel {
    font-size: 11px;
    line-height: 1.1;
  }
  .pin-cell .keymeta {
    font-size: 8px;
    color: var(--text-secondary);
    line-height: 1;
  }

  .matrix-direct {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .matrix-direct .pin-cell.key {
    min-width: 100px;
    border-radius: 4px;
    border: 1px solid var(--divider);
  }

  /* ============= Physical layout (keymap-drawer style) ============= */
  .layout-wrap {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--divider);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .layout-svg {
    display: block;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    height: auto;
  }
  .layout-key rect.outer {
    fill: rgba(255,255,255,0.02);
    stroke: rgba(255,255,255,0.10);
    stroke-width: 0.8;
  }
  .layout-key rect.inner {
    fill: rgba(125,128,144,0.10);
    stroke: rgba(255,255,255,0.10);
    stroke-width: 0.8;
    transition: fill 120ms, stroke 120ms;
  }
  .layout-key text {
    fill: var(--text-primary);
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    user-select: none;
  }
  .layout-key.untestable rect.inner {
    fill: rgba(255,255,255,0.02);
    stroke: rgba(255,255,255,0.06);
  }
  .layout-key.untestable text { fill: var(--text-secondary); font-style: italic; }
  .layout-key.pressed rect.inner {
    fill: rgba(91,255,139,0.22);
    stroke: var(--down-green);
  }
  .layout-key.pressed text { fill: var(--down-green); }
  .layout-key.dead rect.inner {
    fill: rgba(255,95,95,0.25);
    stroke: var(--peak-red);
    stroke-width: 1.5;
  }
  .layout-key.dead text { fill: var(--peak-red); font-weight: 700; }
  .layout-key.highlight-pin rect.inner {
    stroke: var(--accent-cyan);
    stroke-width: 1.8;
  }
  .layout-key.highlight-target rect.inner {
    stroke: var(--accent-cyan);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 6px rgba(91,209,255,0.6));
  }
  .layout-key { cursor: pointer; }

  /* ============= Xiao BLE pin panel (SVG) ============= */
  .xiao-row {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .xiao-board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .xiao-side-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .xiao-svg {
    width: 340px;
    max-width: 100%;
    height: auto;
  }
  .xiao-svg .board-bg {
    fill: #16181f;
    stroke: rgba(255,255,255,0.10);
    stroke-width: 1;
  }
  .xiao-svg .board-text {
    fill: rgba(255,255,255,0.20);
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-weight: 600;
    text-anchor: middle;
  }
  .xiao-svg .usbc {
    fill: #5e5e5e;
    stroke: #2a2a2a;
    stroke-width: 0.5;
  }
  .xiao-svg .pin-hole {
    fill: #d4a93e;
    stroke: rgba(255,255,255,0.2);
    stroke-width: 0.5;
  }
  .xiao-svg .pin-hole-inner {
    fill: #2a2a2a;
  }
  .xiao-svg .pin-pill {
    stroke: rgba(0,0,0,0.4);
    stroke-width: 0.5;
  }
  .xiao-svg .pill-digital  { fill: #5BA1D9; }
  .xiao-svg .pill-analog   { fill: #F4A78A; }
  .xiao-svg .pill-power    { fill: #D85959; }
  .xiao-svg .pill-gnd      { fill: #1f1f1f; stroke: #555; }
  .xiao-svg .pill-iic      { fill: #3EAEAA; }
  .xiao-svg .pill-uart     { fill: #7D8090; }
  .xiao-svg .pill-spi      { fill: #9B7BBF; }
  .xiao-svg .pill-pinno    { fill: #7FB069; }
  .xiao-svg .pill-nfc      { fill: #D85959; }
  .xiao-svg .pill-text {
    fill: #ffffff;
    font-family: ui-monospace, 'SF Mono', monospace;
    font-weight: 700;
    font-size: 9.5px;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
  }
  .xiao-svg .pill-text.dark { fill: #1a1a1a; }
  .xiao-svg .pin-meta {
    fill: var(--text-secondary);
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: 8px;
    pointer-events: none;
  }
  /* Charlieplex active pin: gold halo + highlighted pill */
  .xiao-svg g.pin.charlieplex .pin-hole {
    fill: #ffd24a;
    filter: drop-shadow(0 0 4px rgba(255,210,74,0.8));
  }
  /* Pin with dead keys */
  .xiao-svg g.pin.has-dead .pin-hole {
    fill: var(--peak-red);
    filter: drop-shadow(0 0 6px rgba(255,95,95,0.9));
  }
  .xiao-svg g.pin.has-dead .pin-pill {
    stroke: var(--peak-red);
    stroke-width: 1.5;
  }
  /* Highlighted (selected) pin */
  .xiao-svg g.pin.highlighted .pin-hole {
    fill: var(--accent-cyan);

    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);

    gap: 14px;
    font-size: 12px;
    margin-bottom: 8px;
    align-items: baseline;

  .matrix-stat .stat-num {

    font-size: 12px;

<div class="app">
  <header class="control-bar" id="controlBar">
    <!-- Sound power -->
    <div class="power-wrap" id="powerWrap" title="Sound on/off">
      <div class="power on" id="powerBtn">
        <span class="led"></span>
        <svg class="glyph" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 4 V10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M5.5 6 A6 6 0 1 0 14.5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="section-label">Sound</div>
    </div>

    <div class="vsep"></div>

    <!-- Tone selector -->
    <div class="tone-section">
      <div class="section-label">Tone</div>
      <div class="keycap-row" id="toneRow">
        <div class="keycap selected" data-tone="click">CLICK</div>
        <div class="keycap"          data-tone="beep">BEEP</div>
        <div class="keycap"          data-tone="pop">POP</div>
        <div class="keycap"          data-tone="tick">TICK</div>
        <div class="keycap"          data-tone="synth">SYNTH</div>
      </div>
    </div>

    <div class="vsep"></div>

    <!-- Volume knob -->
    <div class="knob-wrap">
      <svg class="knob-svg" id="knob" viewBox="0 0 84 84">
        <defs>
          <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#2E8BFF"/>
            <stop offset="100%" stop-color="#5BD1FF"/>
          </linearGradient>
          <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#FFA85B"/>
            <stop offset="100%" stop-color="#FF5F5F"/>
          </linearGradient>
          <radialGradient id="metalGrad" cx="0.35" cy="0.30" r="0.65">
            <stop offset="0%"  stop-color="#545766"/>
            <stop offset="60%" stop-color="#2C2E3A"/>
            <stop offset="100%" stop-color="#15161E"/>
          </radialGradient>
          <filter id="cyanGlow"><feGaussianBlur stdDeviation="2.5"/></filter>
          <filter id="redGlow"><feGaussianBlur stdDeviation="2.5"/></filter>
        </defs>
        <!-- background arc -->
        <path id="arcBg" stroke="rgba(255,255,255,0.06)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- lit cyan arc (0..100%) -->
        <path id="arcLit" stroke="url(#cyanGrad)" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#cyanGlow)"/>
        <path id="arcLit2" stroke="url(#cyanGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- peak red arc (100..150%) -->
        <path id="arcPeak" stroke="url(#redGrad)" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#redGlow)"/>
        <path id="arcPeak2" stroke="url(#redGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- knob body -->
        <circle cx="42" cy="42" r="30" fill="url(#metalGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
        <circle cx="42" cy="42" r="30" fill="none" stroke="rgba(0,0,0,0.6)" stroke-width="0.8" transform="translate(0,1)" opacity="0.5"/>
        <!-- indicator -->
        <line id="indicator" stroke="#5BD1FF" stroke-width="2" stroke-linecap="round"
              x1="42" y1="20" x2="42" y2="29"
              filter="url(#cyanGlow)"/>
      </svg>
      <div class="knob-pct" id="knobPct">80%</div>
    </div>

    <div style="flex:1"></div>

    <!-- Actions -->
    <div class="actions">
      <div class="keycap action" id="btnTest">TEST</div>
      <div class="keycap action" id="btnCopy">COPY</div>
      <div class="keycap action" id="btnClear">CLEAR</div>
    </div>
  </header>

  <div class="log-header">
    <div class="title">Keyboard &amp; pointing events</div>
    <div class="mode-switcher" id="modeSwitcher">
      <button class="mode-btn selected" data-mode="events">Events</button>
      <button class="mode-btn" data-mode="matrix">Matrix</button>
    </div>
    <div class="count"><span id="evtCount">0</span> events</div>
  </div>

  <div class="log-container" id="eventsView">
    <div class="scanline"></div>
    <div class="log-scroll" id="logScroll">
      <div class="empty-msg" id="emptyMsg">Click anywhere or press a key to begin</div>
    </div>
  </div>

  <div class="matrix-container" id="matrixView">
    <div class="matrix-controls">
      <label>Keyboard:</label>
      <select class="kb-select" id="kbSelect">
        <option value="corchibi">Corchibi</option>
        <option value="modula">Modula (grid view — layout WIP)</option>
      </select>
      <button class="matrix-btn" id="markDeadBtn">Mark untyped as DEAD</button>
      <button class="matrix-btn" id="resetMatrixBtn">Reset</button>
      <span class="matrix-help" id="matrixHelp">
        Type every key on your keyboard. Then click <b>Mark untyped as DEAD</b>
        to highlight unresponsive keys and pin clusters.
      </span>
    </div>
    <div id="matrixBody"></div>
  </div>
</div>

  }
}
};

// ============= Matrix Diagnostic Mode =============
const matrixState = {
  active: false,
  preset: null,        // current preset object
  pressed: new Set(),  // set of position idx that fired
  marked: false,       // true after "Mark untyped as DEAD"
  highlightIdx: null,  // currently selected key
  highlightPin: null,  // currently selected pin "side:idx"
};

function selectKeyboard(name) {
  matrixState.preset = PRESETS[name] || null;
  matrixState.pressed.clear();
  matrixState.marked = false;
  matrixState.highlightIdx = null;
  matrixState.highlightPin = null;
  renderMatrix();
}

function resetMatrix() {
  matrixState.pressed.clear();
  matrixState.marked = false;
  matrixState.highlightIdx = null;
  matrixState.highlightPin = null;
  renderMatrix();
}

function markUntypedDead() {
  matrixState.marked = true;
  renderMatrix();
}

function setMatrixMode(on) {
  matrixState.active = on;
  document.getElementById('eventsView').classList.toggle('hidden', on);
  document.getElementById('matrixView').classList.toggle('active', on);
  if (on && !matrixState.preset) {
    selectKeyboard(document.getElementById('kbSelect').value);
  } else {
    renderMatrix();
  }
}

// On every keypress, mark matching positions as pressed.
function matrixOnKeyEvent(direction, expected) {
  if (!matrixState.active || !matrixState.preset) return;
  if (direction !== 'down') return;
  let changed = false;
  for (const p of matrixState.preset.positions) {
    if (p.testable && p.expected === expected && !matrixState.pressed.has(p.idx)) {
      matrixState.pressed.add(p.idx);
      changed = true;
    }
  }
  if (changed) renderMatrix();
}

function classifyCell(p) {
  if (!p.testable) return 'untestable';
  if (matrixState.pressed.has(p.idx)) return 'pressed';
  if (matrixState.marked) return 'dead';
  return 'untested';
}

// ===== Pin incidence helpers =====
// For charlieplex, every key uses 2 pins (driver and sensor). Diagnosis
// asks "how many [dead] keys touch this pin?" — combining both roles.
function pinIncidenceOf(positions) {
  const out = { L: {}, R: {} };
  for (const p of positions) {
    if (p.side === 'direct' || !(p.side in out)) continue;
    out[p.side][p.driver] = (out[p.side][p.driver] || 0) + 1;
    if (p.sensor !== p.driver) {
      out[p.side][p.sensor] = (out[p.side][p.sensor] || 0) + 1;
    }
  }
  return out;
}

function renderMatrix() {
  const body = document.getElementById('matrixBody');
  const ps = matrixState.preset;
  if (!ps) { body.innerHTML = ''; return; }

  // No layout coords → fall back to old grid (e.g., Modula until SVG provided)
  if (!ps.layout) {
    body.innerHTML = renderLegacyGridFallback(ps);
    attachKeyClickHandlers(body);
    return;
  }

  const layoutHtml = renderLayoutSVG(ps);
  const xiaoHtml   = renderXiaoBoards(ps);
  const summaryHtml = renderSummary();

  body.innerHTML = `
    <div class="layout-wrap">${layoutHtml}</div>
    <div class="xiao-row">${xiaoHtml}</div>
    ${summaryHtml}
  `;

  // Click on key → highlight key + its 2 pins
  body.querySelectorAll('.layout-key').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      matrixState.highlightIdx =
        matrixState.highlightIdx === idx ? null : idx;
      matrixState.highlightPin = null;
      renderMatrix();
    });
  });

  // Click on a charlieplex pin (SVG group) → highlight all keys touching it
  body.querySelectorAll('.xiao-svg g.pin.charlieplex').forEach(el => {
    el.addEventListener('click', () => {
      const side = el.getAttribute('data-side');
      const pin  = parseInt(el.getAttribute('data-pin'), 10);
      if (!side || isNaN(pin)) return;
      const sig = `${side}:${pin}`;
      matrixState.highlightPin =
        matrixState.highlightPin === sig ? null : sig;
      matrixState.highlightIdx = null;
      renderMatrix();
    });
  });

  applyHighlights(body);
}

function renderLayoutSVG(ps) {
  const L = ps.layout;
  const pad = 8;
  const vbX = L.minX - pad, vbY = L.minY - pad;
  const vbW = (L.maxX - L.minX) + pad*2;
  const vbH = (L.maxY - L.minY) + pad*2;
  let svg = `<svg class="layout-svg" viewBox="${vbX} ${vbY} ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg">`;
  for (const p of ps.positions) {
    if (p.x === undefined) continue;
    const cls = ['layout-key', classifyCell(p)].join(' ');
    const w = p.w || 54, h = p.h || 54;
    svg += `<g class="${cls}" data-idx="${p.idx}" transform="translate(${p.x},${p.y}) rotate(${p.rot || 0})">`;
    svg += `<rect class="outer" x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="6" ry="6"/>`;
    svg += `<rect class="inner" x="${-w/2 + 5}" y="${-h/2 + 5}" width="${w-10}" height="${h-10}" rx="5" ry="5"/>`;
    svg += `<text x="0" y="0">${escapeHtml(p.label)}</text>`;
    svg += `<title>${escapeHtml(p.binding)}\n${p.side} d=${p.driver} s=${p.sensor}</title>`;
    svg += `</g>`;
  }
  svg += `</svg>`;
  return svg;
}

function escapeHtml(s) {
  return String(s).replace(/[<>&"]/g, c =>
    ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
}

// Xiao BLE physical pinout (matches the official pinout image).
// Each pin entry: primary label + GPIO + alternate function labels + type.
const XIAO_PIN_LAYOUT = {
  // Left side, top-to-bottom (USB-C is at top)
  left: [
    { primary: 'D0', gpio: 'P0.02', alts: ['A0'],         type: 'digital' },
    { primary: 'D1', gpio: 'P0.03', alts: ['A1'],         type: 'digital' },
    { primary: 'D2', gpio: 'P0.28', alts: ['A2'],         type: 'digital' },
    { primary: 'D3', gpio: 'P0.29', alts: ['A3'],         type: 'digital' },
    { primary: 'D4', gpio: 'P0.04', alts: ['A4', 'SDA'],  type: 'digital' },
    { primary: 'D5', gpio: 'P0.05', alts: ['A5', 'SCL'],  type: 'digital' },
    { primary: 'D6', gpio: 'P1.11', alts: ['TX'],         type: 'digital' },
  ],
  // Right side, top-to-bottom
  right: [
    { primary: '5V',  gpio: '+5V',   alts: [],            type: 'power'   },
    { primary: 'GND', gpio: 'GND',   alts: [],            type: 'gnd'     },
    { primary: '3V3', gpio: '+3V3',  alts: [],            type: 'power'   },
    { primary: 'D10', gpio: 'P1.15', alts: ['MOSI'],      type: 'digital' },
    { primary: 'D9',  gpio: 'P1.14', alts: ['MISO'],      type: 'digital' },
    { primary: 'D8',  gpio: 'P1.13', alts: ['SCK'],       type: 'digital' },
    { primary: 'D7',  gpio: 'P1.12', alts: ['RX'],        type: 'digital' },
  ],
  // Hidden NFC pads on the back of the board
  nfc: [
    { primary: 'P0.10', gpio: 'P0.10', alts: ['NFC1'],    type: 'nfc' },
    { primary: 'P0.09', gpio: 'P0.09', alts: ['NFC2'],    type: 'nfc' },
  ],
};

function findXiaoPinPosition(label) {
  for (const where of ['left', 'right', 'nfc']) {
    const idx = XIAO_PIN_LAYOUT[where].findIndex(p =>
      p.primary === label || p.gpio === label);
    if (idx >= 0) return { where, idx, info: XIAO_PIN_LAYOUT[where][idx] };
  }
  return null;
}

function renderXiaoBoards(ps) {
  const totalIncidence = pinIncidenceOf(ps.positions);
  const deadIncidence = matrixState.marked
    ? pinIncidenceOf(ps.positions.filter(p => p.testable && !matrixState.pressed.has(p.idx)))
    : { L: {}, R: {} };

  return ['L', 'R'].map(side =>
    renderXiaoBoardSVG(side, ps, totalIncidence, deadIncidence)
  ).join('');
}

function renderXiaoBoardSVG(side, ps, totalIncidence, deadIncidence) {
  const labels = side === 'L' ? ps.pinLabelsL : ps.pinLabelsR;
  const sideName = side === 'L' ? 'Left half' : 'Right half';

  // Build mapping: charlieplex pin index -> Xiao layout position
  // labels[i] is e.g. "D1" or "P0.09"; resolve each.
  const cpToXiao = labels.map(label => findXiaoPinPosition(label));

  // Selected key for highlight
  let target = null;
  if (matrixState.highlightIdx !== null) {
    target = ps.positions.find(p => p.idx === matrixState.highlightIdx);
    if (target && target.side !== side) target = null;
  }
  const hiPinIdx = matrixState.highlightPin && matrixState.highlightPin.startsWith(side + ':')
    ? parseInt(matrixState.highlightPin.split(':')[1], 10) : null;

  // Geometry — modelled loosely on the Seeed pinout image
  const W = 340, H = 360;
  const boardX = 96, boardY = 24, boardW = 148, boardH = 280;
  const usbcW = 48, usbcH = 14;
  const pinSpacing = 36;
  const pinStartY = boardY + 26;
  const holeR = 6;
  const pillW = 38, pillH = 18;

  const svg = [];
  svg.push(`<svg class="xiao-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`);

  // Board outline
  svg.push(`<rect class="usbc" x="${boardX + boardW/2 - usbcW/2}" y="${boardY - usbcH + 2}" width="${usbcW}" height="${usbcH}" rx="2" ry="2"/>`);
  svg.push(`<rect class="board-bg" x="${boardX}" y="${boardY}" width="${boardW}" height="${boardH}" rx="6" ry="6"/>`);
  svg.push(`<text class="board-text" x="${boardX + boardW/2}" y="${boardY + 110}" font-size="11">seeed</text>`);
  svg.push(`<text class="board-text" x="${boardX + boardW/2}" y="${boardY + 124}" font-size="8">Xiao BLE</text>`);
  svg.push(`<text class="board-text" x="${boardX + boardW/2}" y="${boardY + 138}" font-size="7" style="opacity:0.6">nRF52840</text>`);

  // Helper: render a pin at index `i` on `whereSide` ('left' or 'right')
  function renderPin(whereSide, i) {
    const info = XIAO_PIN_LAYOUT[whereSide][i];
    const yPin = pinStartY + i * pinSpacing;
    const holeX = whereSide === 'left' ? boardX + 10 : boardX + boardW - 10;
    const pillX = whereSide === 'left' ? holeX - 16 - pillW : holeX + 16;
    const pillCenterX = pillX + pillW / 2;
    const cpIdx = cpToXiao.findIndex(p => p && p.where === whereSide && p.idx === i);

    const cls = ['pin'];
    let dead = 0, total = 0;
    if (cpIdx >= 0) {
      cls.push('charlieplex');
      total = totalIncidence[side][cpIdx] || 0;
      dead  = deadIncidence[side][cpIdx]  || 0;
      if (dead >= 1) cls.push('has-dead');
      if (target && (target.driver === cpIdx || target.sensor === cpIdx)) cls.push('highlighted');
      if (hiPinIdx === cpIdx) cls.push('highlighted');
    }

    const pillClass = `pill-${info.type}`;
    const textClass = info.type === 'gnd' ? 'pill-text' : 'pill-text';

    let g = `<g class="${cls.join(' ')}"${cpIdx >= 0 ? ` data-side="${side}" data-pin="${cpIdx}"` : ''}>`;
    // Trace from pill to hole
    if (whereSide === 'left') {
      g += `<line class="pin-trace" x1="${pillX + pillW}" y1="${yPin}" x2="${holeX - holeR}" y2="${yPin}" stroke="rgba(212,169,62,0.4)" stroke-width="1"/>`;
    } else {
      g += `<line class="pin-trace" x1="${holeX + holeR}" y1="${yPin}" x2="${pillX}" y2="${yPin}" stroke="rgba(212,169,62,0.4)" stroke-width="1"/>`;
    }
    // Pill (label block)
    g += `<rect class="pin-pill ${pillClass}" x="${pillX}" y="${yPin - pillH/2}" width="${pillW}" height="${pillH}" rx="3" ry="3"/>`;
    g += `<text class="${textClass}" x="${pillCenterX}" y="${yPin + 0.5}">${escapeHtml(info.primary)}</text>`;
    // Secondary labels (gpio number + alts), placed further outside
    const metaX = whereSide === 'left' ? pillX - 4 : pillX + pillW + 4;
    const metaAnchor = whereSide === 'left' ? 'end' : 'start';
    const metaParts = [info.gpio, ...info.alts];
    metaParts.forEach((p, mi) => {
      g += `<text class="pin-meta" x="${metaX}" y="${yPin + (mi - (metaParts.length - 1) / 2) * 9 + 2.5}" text-anchor="${metaAnchor}">${escapeHtml(p)}</text>`;
    });
    // Pin hole (gold pad)
    g += `<circle class="pin-hole" cx="${holeX}" cy="${yPin}" r="${holeR}"/>`;
    g += `<circle class="pin-hole-inner" cx="${holeX}" cy="${yPin}" r="${holeR/2}"/>`;
    // Charlieplex info next to hole (inside board)
    if (cpIdx >= 0 && total > 0) {
      const insideX = whereSide === 'left' ? holeX + holeR + 5 : holeX - holeR - 5;
      const insideAnchor = whereSide === 'left' ? 'start' : 'end';
      g += `<text class="keys-count" x="${insideX}" y="${yPin - 2}" text-anchor="${insideAnchor}">${total} keys</text>`;
      if (dead > 0) {
        // Dead badge
        const badgeX = whereSide === 'left' ? holeX + holeR + 12 : holeX - holeR - 12;
        const badgeY = yPin + 8;
        g += `<circle class="dead-badge" cx="${badgeX}" cy="${badgeY}" r="7"/>`;
        g += `<text class="dead-text" x="${badgeX}" y="${badgeY + 0.5}">${dead}</text>`;
      }
    }
    g += `</g>`;
    return g;
  }

  for (let i = 0; i < XIAO_PIN_LAYOUT.left.length; i++) svg.push(renderPin('left', i));
  for (let i = 0; i < XIAO_PIN_LAYOUT.right.length; i++) svg.push(renderPin('right', i));

  // NFC pads on the back (small panel below the board)
  const nfcUsed = XIAO_PIN_LAYOUT.nfc.some((p, i) =>
    cpToXiao.some(cp => cp && cp.where === 'nfc' && cp.idx === i));
  if (nfcUsed) {
    const nfcY = boardY + boardH + 14;
    svg.push(`<rect class="nfc-pad" x="${boardX + 20}" y="${nfcY}" width="${boardW - 40}" height="34" rx="4" ry="4"/>`);
    svg.push(`<text class="nfc-label" x="${boardX + boardW/2}" y="${nfcY + 8}">back · NFC pads</text>`);
    XIAO_PIN_LAYOUT.nfc.forEach((info, i) => {
      const cpIdx = cpToXiao.findIndex(p => p && p.where === 'nfc' && p.idx === i);
      const cx = boardX + 40 + i * (boardW - 80);
      const cy = nfcY + 22;
      const cls = ['pin'];
      if (cpIdx >= 0) {
        cls.push('charlieplex');
        const dead  = deadIncidence[side][cpIdx] || 0;
        if (dead >= 1) cls.push('has-dead');
        if (target && (target.driver === cpIdx || target.sensor === cpIdx)) cls.push('highlighted');
        if (hiPinIdx === cpIdx) cls.push('highlighted');
      }
      svg.push(`<g class="${cls.join(' ')}"${cpIdx >= 0 ? ` data-side="${side}" data-pin="${cpIdx}"` : ''}>`);
      svg.push(`<rect class="pin-pill pill-nfc" x="${cx - 22}" y="${cy - 9}" width="44" height="18" rx="3" ry="3"/>`);
      svg.push(`<text class="pill-text" x="${cx}" y="${cy + 0.5}">${escapeHtml(info.primary)}</text>`);
      if (cpIdx >= 0) {
        const total = totalIncidence[side][cpIdx] || 0;
        const dead  = deadIncidence[side][cpIdx]  || 0;
        svg.push(`<text class="keys-count" x="${cx}" y="${cy + 22}" text-anchor="middle">${total} keys${dead > 0 ? ', ' + dead + ' dead' : ''}</text>`);
      }
      svg.push(`</g>`);
    });
  }

  svg.push(`</svg>`);

  return `
    <div class="xiao-board-wrap">
      <div class="xiao-side-label">${sideName} · Xiao BLE</div>
      ${svg.join('')}
    </div>
  `;
}

function applyHighlights(body) {
  const ps = matrixState.preset;
  if (!ps) return;

  if (matrixState.highlightIdx !== null) {
    const target = ps.positions.find(p => p.idx === matrixState.highlightIdx);
    if (!target) return;
    body.querySelectorAll('.layout-key').forEach(el => {
      const idx = parseInt(el.dataset.idx, 10);
      const p = ps.positions.find(pp => pp.idx === idx);
      if (!p || p.side !== target.side) return;
      if (idx === target.idx) {
        el.classList.add('highlight-target');
      } else if (p.driver === target.driver || p.sensor === target.sensor ||
                 p.driver === target.sensor || p.sensor === target.driver) {
        el.classList.add('highlight-pin');
      }
    });
  }

  if (matrixState.highlightPin) {
    const [side, pinStr] = matrixState.highlightPin.split(':');
    const pin = parseInt(pinStr, 10);
    body.querySelectorAll('.layout-key').forEach(el => {
      const idx = parseInt(el.dataset.idx, 10);
      const p = ps.positions.find(pp => pp.idx === idx);
      if (!p || p.side !== side) return;
      if (p.driver === pin || p.sensor === pin) {
        el.classList.add('highlight-pin');
      }
    });
  }
}

function attachKeyClickHandlers(body) {
  body.querySelectorAll('.pin-cell.key').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      matrixState.highlightIdx =
        matrixState.highlightIdx === idx ? null : idx;
      renderMatrix();
    });
  });
}

// Legacy grid for keyboards without layout coords (Modula until parsed)
function renderLegacyGridFallback(ps) {
  let html = '<div style="margin-bottom:14px;color:var(--text-secondary);font-size:11px;">Physical layout not yet configured for this keyboard — showing pin-matrix grid:</div>';
  const sides = { L: [], R: [], direct: [] };
  for (const p of ps.positions) sides[p.side].push(p);
  for (const side of ['L', 'R']) {
    if (sides[side].length === 0) continue;
    html += `<div class="matrix-side"><div class="matrix-side-title">${side === 'L' ? 'Left' : 'Right'}</div>`;
    html += renderLegacyPinGrid(sides[side], side === 'L' ? ps.pinLabelsL : ps.pinLabelsR, ps.pinsPerSide);
    html += `</div>`;
  }
  html += renderSummary();
  return html;
}

function renderLegacyPinGrid(positions, pinLabels, N) {
  const labels = pinLabels.length === N ? pinLabels : Array.from({length: N}, (_, i) => `P${i}`);
  const at = {};
  for (const p of positions) at[`${p.driver},${p.sensor}`] = p;
  let html = `<div class="pin-grid" style="grid-template-columns: 50px repeat(${N}, 60px);">`;
  html += `<div class="pin-cell label-corner">d↓ / s→</div>`;
  for (let s = 0; s < N; s++) {
    html += `<div class="pin-cell label">${labels[s]}</div>`;
  }
  for (let d = 0; d < N; d++) {
    html += `<div class="pin-cell label">${labels[d]}</div>`;
    for (let s = 0; s < N; s++) {
      if (d === s) { html += `<div class="pin-cell diagonal">─</div>`; continue; }
      const p = at[`${d},${s}`];
      if (!p) { html += `<div class="pin-cell empty"></div>`; continue; }
      html += `<div class="pin-cell key ${classifyCell(p)}" data-idx="${p.idx}" title="${p.binding}">
        <div class="keylabel">${p.label}</div></div>`;
    }
  }
  html += `</div>`;
  return html;
}

function renderSummary() {
  const ps = matrixState.preset;
  if (!ps) return '';
  const testable = ps.positions.filter(p => p.testable);
  const pressed = testable.filter(p => matrixState.pressed.has(p.idx));
  const dead = matrixState.marked
    ? testable.filter(p => !matrixState.pressed.has(p.idx))
    : [];
  const untouched = matrixState.marked ? 0 : testable.length - pressed.length;

  let html = `<div class="matrix-summary">`;
  html += `<div class="matrix-summary-title">Status</div>`;
  html += `<div class="matrix-stat">`;
  html += `  <span><span class="stat-num stat-pressed">${pressed.length}</span> typed</span>`;
  if (matrixState.marked) {
    html += `  <span><span class="stat-num stat-dead">${dead.length}</span> dead</span>`;
  } else {
    html += `  <span><span class="stat-num stat-untouched">${untouched}</span> untyped</span>`;
  }
  html += `  <span style="color:var(--text-secondary);font-size:11px;">(${ps.positions.length - testable.length} untestable: trans / mo / mod-morphs)</span>`;
  html += `</div>`;

  if (matrixState.marked && dead.length > 0) {
    // Pin-incidence cluster analysis
    const inc = pinIncidenceOf(dead);
    const insights = [];
    for (const side of ['L', 'R']) {
      for (const [pinStr, count] of Object.entries(inc[side])) {
        if (count >= 2) {
          const lab = (side === 'L' ? ps.pinLabelsL : ps.pinLabelsR)[parseInt(pinStr)] || `P${pinStr}`;
          insights.push({ side, pin: parseInt(pinStr), count, lab });
        }
      }
    }
    insights.sort((a, b) => b.count - a.count);
    if (insights.length === 0) {
      html += `<div class="matrix-insight info">Dead keys are scattered — likely individual switch / diode solder issues.</div>`;
    } else {
      for (const x of insights) {
        const sideName = x.side === 'L' ? 'LEFT' : 'RIGHT';
        html += `<div class="matrix-insight">⚠ <b>${x.count}</b> dead keys touch pin <code>${x.lab}</code> on ${sideName} → inspect that pin's solder / trace on the Xiao BLE</div>`;
      }
    }
    html += `<div class="matrix-insight info" style="font-size:11px;">Dead: ` +
      dead.map(p => `${p.label} <code>${p.side}(${(p.side==='L'?ps.pinLabelsL:ps.pinLabelsR)[p.driver]}↔${(p.side==='L'?ps.pinLabelsL:ps.pinLabelsR)[p.sensor]})</code>`).join(', ') +
      `</div>`;
  } else if (matrixState.marked && dead.length === 0) {
    html += `<div class="matrix-insight info">All testable keys responded ✓</div>`;
  } else {
    html += `<div class="matrix-insight info">Type every key — pressed keys turn green. Click any key to see its two Xiao BLE pins; click a pin to see all keys wired to it. When done, click <b>Mark untyped as DEAD</b>.</div>`;
  }
  html += `</div>`;
  return html;
}

// ============= Sound (Web Audio API) =============
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// One-shot click for click/beep/pop/tick.
function playClick() {
  if (!state.soundOn) return;
  if (state.tone === 'synth') return;  // synth uses sustain path
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const params = ({
    click: { f: 1500, dur: 0.030 },
    beep:  { f:  880, dur: 0.080 },
    pop:   { f:  600, dur: 0.025 },
    tick:  { f: 4000, dur: 0.012 },
  })[state.tone];
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = params.f;
  const peak = Math.min(state.volume, 1.5) * 0.9;
  gain.gain.setValueAtTime(peak, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + params.dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + params.dur);
}

// Sustained synth — fixed 440Hz sine, attack/release envelope, polyphony via
// active-count: any number of keys held = tone plays, last release = tone stops.
let synthOsc = null;
let synthGain = null;
let synthActiveCount = 0;
const SYNTH_FREQ = 440;
const SYNTH_ATTACK_S = 0.005;
const SYNTH_RELEASE_S = 0.030;
function synthPeakGain() { return Math.min(state.volume, 1.5) * 0.45; }

function startSynth() {
  if (!state.soundOn) return;
  ensureAudio();
  if (!audioCtx) return;
  if (synthActiveCount === 0) {
    const now = audioCtx.currentTime;
    synthOsc = audioCtx.createOscillator();
    synthGain = audioCtx.createGain();
    synthOsc.type = 'sine';
    synthOsc.frequency.value = SYNTH_FREQ;
    synthGain.gain.setValueAtTime(0, now);
    synthGain.gain.linearRampToValueAtTime(synthPeakGain(), now + SYNTH_ATTACK_S);
    synthOsc.connect(synthGain).connect(audioCtx.destination);
    synthOsc.start(now);
  }
  synthActiveCount++;
}
function stopSynth() {
  synthActiveCount = Math.max(0, synthActiveCount - 1);
  if (synthActiveCount === 0 && synthOsc && synthGain && audioCtx) {
    const now = audioCtx.currentTime;
    synthGain.gain.cancelScheduledValues(now);
    synthGain.gain.setValueAtTime(synthGain.gain.value, now);
    synthGain.gain.linearRampToValueAtTime(0, now + SYNTH_RELEASE_S);
    synthOsc.stop(now + SYNTH_RELEASE_S + 0.005);
    synthOsc = null;
    synthGain = null;
  }
}
function stopSynthAll() {
  synthActiveCount = 0;
  if (synthOsc && synthGain && audioCtx) {
    const now = audioCtx.currentTime;
    synthGain.gain.cancelScheduledValues(now);
    synthGain.gain.setValueAtTime(synthGain.gain.value, now);
    synthGain.gain.linearRampToValueAtTime(0, now + SYNTH_RELEASE_S);
    synthOsc.stop(now + SYNTH_RELEASE_S + 0.005);
    synthOsc = null;
    synthGain = null;
  }
}

// Test button: brief preview burst (works for both modes).
function playTest() {
  if (state.tone === 'synth') {
    startSynth();
    setTimeout(stopSynthAll, 180);
  } else {
    playClick();
  }
}

// Route an event's sound based on direction + tone.
function soundForEvent(direction) {
  if (!state.soundOn) return;
  if (state.tone === 'synth') {
    if (direction === 'down')      startSynth();
    else if (direction === 'up')   stopSynth();
  } else {
    playClick();
  }
}

// ============= Knob (SVG arcs) =============
const KNOB = {
  cx: 42, cy: 42, r: 32,
  startDeg: 225,    // compass, "off" position bottom-left
  sweep: 270,       // total arc
  maxValue: 1.5,
};
function compassPoint(cx, cy, r, deg) {
  // 0 = north (up), 90 = east, clockwise
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function arcPath(cx, cy, r, startDeg, endDeg) {
  const span = endDeg - startDeg;
  if (Math.abs(span) < 0.01) return '';
  const start = compassPoint(cx, cy, r, startDeg);
  const end   = compassPoint(cx, cy, r, endDeg);
  const largeArc = Math.abs(span) > 180 ? 1 : 0;
  const sweep = span > 0 ? 1 : 0;
  return `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} ` +
         `A ${r} ${r} 0 ${largeArc} ${sweep} ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
}
const arcBg    = document.getElementById('arcBg');
const arcLit   = document.getElementById('arcLit');
const arcLit2  = document.getElementById('arcLit2');
const arcPeak  = document.getElementById('arcPeak');
const arcPeak2 = document.getElementById('arcPeak2');
const indicator = document.getElementById('indicator');
const knobPct  = document.getElementById('knobPct');

function updateKnob() {
  const v = state.volume;
  const fraction = v / KNOB.maxValue;                  // 0..1
  const fractionAt100 = 1.0 / KNOB.maxValue;           // 1/1.5
  const angleDeg = KNOB.startDeg + fraction * KNOB.sweep;
  const angle100 = KNOB.startDeg + fractionAt100 * KNOB.sweep;

  // background full arc
  arcBg.setAttribute('d', arcPath(KNOB.cx, KNOB.cy, KNOB.r, KNOB.startDeg, KNOB.startDeg + KNOB.sweep));
  // lit cyan arc (0..min(angle, angle100))
  const litEnd = Math.min(angleDeg, angle100);
  arcLit.setAttribute('d', arcPath(KNOB.cx, KNOB.cy, KNOB.r, KNOB.startDeg, litEnd));
  arcLit2.setAttribute('d', arcPath(KNOB.cx, KNOB.cy, KNOB.r, KNOB.startDeg, litEnd));
  // peak red arc (angle100..angle when v > 1.0)
  if (v > 1.0) {
    arcPeak.setAttribute('d',  arcPath(KNOB.cx, KNOB.cy, KNOB.r, angle100, angleDeg));
    arcPeak2.setAttribute('d', arcPath(KNOB.cx, KNOB.cy, KNOB.r, angle100, angleDeg));
  } else {
    arcPeak.setAttribute('d', '');
    arcPeak2.setAttribute('d', '');
  }
  // indicator line — rotate from default vertical
  const rotDeg = angleDeg; // since SVG angle 0 = top in our compass model... but transform rotate is clockwise from 12 o'clock if origin is correct
  indicator.setAttribute('transform', `rotate(${rotDeg - 360 + 0} ${KNOB.cx} ${KNOB.cy})`);
  // recolor indicator on peak
  indicator.setAttribute('stroke', v > 1.0 ? '#FF5F5F' : '#5BD1FF');

  knobPct.textContent = `${Math.round(v * 100)}%`;
  knobPct.classList.toggle('peak', v > 1.0);
}

// drag handling
const knob = document.getElementById('knob');
let dragStartY = null, dragStartValue = null;
knob.addEventListener('pointerdown', e => {
  dragStartY = e.clientY;
  dragStartValue = state.volume;
  knob.setPointerCapture(e.pointerId);
});
knob.addEventListener('pointermove', e => {
  if (dragStartY === null) return;
  const dy = e.clientY - dragStartY;
  const delta = -dy / 240 * KNOB.maxValue;
  state.volume = Math.max(0, Math.min(KNOB.maxValue, dragStartValue + delta));
  updateKnob();
});
knob.addEventListener('pointerup', e => { dragStartY = null; });
knob.addEventListener('pointercancel', e => { dragStartY = null; });
// scroll wheel fine adjust
knob.addEventListener('wheel', e => {
  e.preventDefault();
  state.volume = Math.max(0, Math.min(KNOB.maxValue, state.volume - e.deltaY * 0.002));
  updateKnob();
}, { passive: false });

// ============= Power button =============
const powerBtn = document.getElementById('powerBtn');
document.getElementById('powerWrap').addEventListener('click', () => {
  state.soundOn = !state.soundOn;
  powerBtn.classList.toggle('on', state.soundOn);
});

// ============= Tone selector =============
document.getElementById('toneRow').addEventListener('click', e => {
  const cap = e.target.closest('.keycap');
  if (!cap) return;
  const prevTone = state.tone;
  state.tone = cap.dataset.tone;
  document.querySelectorAll('#toneRow .keycap').forEach(el => {
    el.classList.toggle('selected', el === cap);
  });
  // If switching AWAY from synth while a tone is sustaining, cut it off.
  if (prevTone === 'synth' && state.tone !== 'synth') {
    stopSynthAll();
  }
});

// ============= Action buttons =============
document.getElementById('btnTest').addEventListener('click', () => {
  ensureAudio();
  playTest();
});
document.getElementById('btnCopy').addEventListener('click', () => {
  const text = state.events.map(e => {
    let s = `${e.direction}\t${e.label}`;
    if (e.isChatter) s += `  CHATTER`;
    if (e.holdMs != null) s += `  held:${e.holdMs}ms`;
    if (e.flagsText) s += `  flags ${e.flagsText}`;
    s += `  usage page: ${e.usagePage} (0x${e.usagePage.toString(16).padStart(4,'0')})  ` +
         `usage: ${e.usage} (0x${e.usage.toString(16).padStart(4,'0')})`;
    return s;
  }).join('\n');
  navigator.clipboard.writeText(text);
});
document.getElementById('btnClear').addEventListener('click', () => {
  state.events = [];
  renderLog();
});

// ============= Event capture =============
function modifiersFromEvent(e) {
  const parts = [];
  if (e.getModifierState && e.getModifierState('CapsLock')) parts.push('caps_lock');
  if (e.shiftKey) parts.push('shift');
  if (e.ctrlKey)  parts.push('control');
  if (e.altKey)   parts.push('option');
  if (e.metaKey)  parts.push('command');
  return parts.join(',');
}

// Track press / chatter for an identifier; returns {isChatter, holdMs}.
function track(direction, id) {
  const now = performance.now();
  if (direction === 'down') {
    let isChatter = false;
    const prev = state.lastDown[id];
    if (prev !== undefined && now - prev < CHATTER_THRESHOLD_MS) {
      isChatter = true;
    }
    state.lastDown[id]   = now;
    state.pressStart[id] = now;
    return { isChatter, holdMs: null };
  } else {
    let holdMs = null;
    const start = state.pressStart[id];
    if (start !== undefined) {
      holdMs = Math.round(now - start);
      delete state.pressStart[id];
    }
    return { isChatter: false, holdMs };
  }
}

function emit(direction, code, e, isMouse) {
  if (isMouse) {
    const btn = (e.button ?? 0) + 1;
    const t = track(direction, `mouse.${btn}`);
    return addEvent({
      direction,
      label: `{"pointing_button":"button${btn}"}`,
      flagsText: modifiersFromEvent(e),
      usagePage: 0x09,
      usage: btn,
      extra: null,
      holdMs: t.holdMs,
      isChatter: t.isChatter,
    });
  }
  const map = HID_MAP[code];
  const name = map ? map[0] : `key_code_${code}`;
  const usage = map ? map[1] : 0;
  const chars = (e.key && e.key.length === 1) ? e.key : '';
  const extra = chars
    ? `chars: "${chars}"  code: ${code}`
    : `code: ${code}`;
  const t = track(direction, code);
  addEvent({
    direction,
    label: `{"key_code":"${name}"}`,
    flagsText: modifiersFromEvent(e),
    usagePage: 0x07,
    usage,
    extra,
    holdMs: t.holdMs,
    isChatter: t.isChatter,
  });
}

function addEvent(evt) {
  state.events.push(evt);
  if (state.events.length > state.maxEvents) {
    state.events.splice(0, state.events.length - state.maxEvents);
  }
  appendRow(evt);
  document.getElementById('evtCount').textContent = state.events.length;
  if (state.events.length === 1) {
    const empty = document.getElementById('emptyMsg');
    if (empty) empty.remove();
  }
  soundForEvent(evt.direction);

  // Forward to matrix diagnostic (parses key_code from label)
  if (matrixState.active) {
    const m = evt.label.match(/^\{"(?:key_code|pointing_button)":"([^"]+)"\}$/);
    if (m) {
      const expected = m[0].includes('pointing_button') ? `mouse:${evt.usage}` : m[1];
      matrixOnKeyEvent(evt.direction, expected);
    }
  }
}

function appendRow(e) {
  const row = document.createElement('div');
  row.className = `row ${e.direction}`;

  // accent bar
  const accent = document.createElement('div');
  accent.className = 'accent';
  row.appendChild(accent);

  // direction
  const dir = document.createElement('div');
  dir.className = 'dir';
  dir.textContent = e.direction;
  row.appendChild(dir);

  // center column
  const center = document.createElement('div');
  center.className = 'center';

  // syntax-highlighted JSON
  const json = document.createElement('div');
  json.className = 'json';
  json.appendChild(span('punct', '{'));
  json.appendChild(span('punct', '"'));
  // detect key/value
  const m = e.label.match(/^\{"([^"]+)":"([^"]+)"\}$/);
  if (m) {
    json.appendChild(span('key', m[1]));
    json.appendChild(span('punct', '"'));
    json.appendChild(span('punct', ':'));
    json.appendChild(span('punct', '"'));
    json.appendChild(span('value', m[2]));
  } else {
    json.appendChild(span('value', e.label));
  }
  json.appendChild(span('punct', '"'));
  json.appendChild(span('punct', '}'));
  center.appendChild(json);

  // meta line
  const meta = document.createElement('div');
  meta.className = 'meta';

  // chatter chip (down only)
  if (e.isChatter) {
    const chip = document.createElement('div');
    chip.className = 'chatter-chip';
    chip.textContent = '⚠ CHATTER';
    meta.appendChild(chip);
  }

  // held duration chip (up only)
  if (e.holdMs != null) {
    const cls = e.holdMs < 50 ? 'short' : (e.holdMs < 200 ? 'tap' : 'hold');
    const chip = document.createElement('div');
    chip.className = `held-chip ${cls}`;
    chip.textContent = `held: ${e.holdMs}ms`;
    meta.appendChild(chip);
  }

  if (e.flagsText) {
    const glyphs = MOD_GLYPHS
      .filter(([needle, _]) => e.flagsText.includes(needle.toLowerCase()))
      .map(([_, g]) => g);
    glyphs.forEach(g => {
      const chip = document.createElement('div');
      chip.className = 'glyph-chip';
      chip.textContent = g;
      meta.appendChild(chip);
    });
  }
  if (e.extra) {
    const ex = document.createElement('span');
    ex.className = 'extra';
    ex.textContent = e.extra;
    meta.appendChild(ex);
  }
  center.appendChild(meta);
  row.appendChild(center);

  // right cols
  const right = document.createElement('div');
  right.className = 'right-cols';
  right.appendChild(makeCol('PAGE',
    `${e.usagePage} (0x${e.usagePage.toString(16).padStart(4,'0')})`));
  right.appendChild(makeCol('USAGE',
    `${e.usage} (0x${e.usage.toString(16).padStart(4,'0')})`));
  row.appendChild(right);

  document.getElementById('logScroll').appendChild(row);
  // auto-scroll
  const sc = document.getElementById('logScroll');
  sc.scrollTop = sc.scrollHeight;
}

function span(cls, text) {
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = text;
  return s;
}
function makeCol(label, value) {
  const col = document.createElement('div');
  col.className = 'col';
  const l = document.createElement('span');
  l.className = 'col-label';
  l.textContent = label;
  const v = document.createElement('span');
  v.className = 'col-value';
  v.textContent = value;
  col.append(l, v);
  return col;
}

function renderLog() {
  const sc = document.getElementById('logScroll');
  sc.innerHTML = '';
  if (state.events.length === 0) {
    const e = document.createElement('div');
    e.className = 'empty-msg';
    e.id = 'emptyMsg';
    e.textContent = 'Click anywhere or press a key to begin';
    sc.appendChild(e);
  }
  document.getElementById('evtCount').textContent = state.events.length;
}

// keyboard
window.addEventListener('keydown', e => {
  ensureAudio();
  // Block default browser shortcuts where we can, so the page stays focused.
  // Cmd+W/Q/T/N/R can't be intercepted reliably — those will close/reload.
  if (!(e.metaKey && ['w','q','t','n','r','l','f'].includes((e.key || '').toLowerCase()))) {
    e.preventDefault();
  }
  if (e.repeat) return;
  emit('down', e.code, e, false);
});
window.addEventListener('keyup', e => {
  if (!(e.metaKey && ['w','q','t','n','r','l','f'].includes((e.key || '').toLowerCase()))) {
    e.preventDefault();
  }
  emit('up', e.code, e, false);
});
// mouse
window.addEventListener('mousedown', e => {
  ensureAudio();
  emit('down', null, e, true);
});
window.addEventListener('mouseup',   e => emit('up',   null, e, true));
// suppress context menu on right click so we can detect button2/3 cleanly
window.addEventListener('contextmenu', e => e.preventDefault());

// If the page loses focus mid-press, stop any sustaining synth and reset
// press tracking so stale presses don't produce huge "held" times.
window.addEventListener('blur', () => {
  stopSynthAll();
  state.pressStart = {};
});

// Mode switcher
document.getElementById('modeSwitcher').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  document.querySelectorAll('#modeSwitcher .mode-btn').forEach(b => {
    b.classList.toggle('selected', b === btn);
  });
  setMatrixMode(btn.dataset.mode === 'matrix');
});

// Matrix controls
document.getElementById('kbSelect').addEventListener('change', e => {
  selectKeyboard(e.target.value);
});
document.getElementById('markDeadBtn').addEventListener('click', markUntypedDead);
document.getElementById('resetMatrixBtn').addEventListener('click', resetMatrix);

// initial render
updateKnob();
</script>
